name: CI
permissions:
  contents: read
on:
  pull_request:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  REGISTRY_NAMESPACE: vempain
  IMAGE_NAME: ${{ github.repository }}

concurrency: build

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up NodeJS
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Resolve package token
        shell: bash
        run: |
          if [ -n "${{ secrets.VEMPAIN_ACTION_TOKEN }}" ]; then
            echo "Using VEMPAIN_ACTION_TOKEN for package registry authentication"
            VEMPAIN_ACTION_TOKEN="${{ secrets.VEMPAIN_ACTION_TOKEN }}"
          else
            echo "VEMPAIN_ACTION_TOKEN not found, falling back to GITHUB_TOKEN for package registry authentication"
            VEMPAIN_ACTION_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          fi
          echo "VEMPAIN_ACTION_TOKEN=${VEMPAIN_ACTION_TOKEN}" >> $GITHUB_ENV

      - name: Test
        run: |
          yarn install
          yarn build
          yarn test --passWithNoTests --watchAll=false
        env:
          VEMPAIN_ACTION_TOKEN: ${{ env.VEMPAIN_ACTION_TOKEN }}

      - name: Coverage
        run: |
          yarn test:coverage
        env:
          VEMPAIN_ACTION_TOKEN: ${{ env.VEMPAIN_ACTION_TOKEN }}

  version-and-upload:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up NodeJS
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Resolve package token
        shell: bash
        run: |
          if [ -n "${{ secrets.VEMPAIN_ACTION_TOKEN }}" ]; then
            echo "Using VEMPAIN_ACTION_TOKEN for package registry authentication"
            VEMPAIN_ACTION_TOKEN="${{ secrets.VEMPAIN_ACTION_TOKEN }}"
          else
            echo "VEMPAIN_ACTION_TOKEN not found, falling back to GITHUB_TOKEN for package registry authentication"
            VEMPAIN_ACTION_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          fi
          echo "VEMPAIN_ACTION_TOKEN=${VEMPAIN_ACTION_TOKEN}" >> $GITHUB_ENV

      - name: Get main and base version
        id: basemain
        shell: bash
        run: |
          baseVersion=$(cat VERSION)
          mainVersion=$(echo ${baseVersion} | cut -d '.' -f 1)
          echo "baseVersion=${baseVersion}" >> $GITHUB_OUTPUT
          echo "mainVersion=${mainVersion}" >> $GITHUB_OUTPUT

      - name: Generate new version
        id: newVer
        shell: bash
        run: |
          git fetch --tags origin
          currentVersion=$(git tag --list --sort=-version:refname "${baseVersion}.*" | head -n 1 || "${baseVersion}.0")

          if [ -z "${currentVersion}" ]; then
            newVersion="${baseVersion}.0"
          else
            runningNumber=$(echo ${currentVersion} | cut -f 3 -d '.')
            newVersion="${baseVersion}.$((${runningNumber} + 1))"
          fi
          echo "The generated new version is: ${newVersion}"
          echo "newVersion=${newVersion}" >> $GITHUB_OUTPUT
        env:
          baseVersion: ${{ steps.basemain.outputs.baseVersion }}

      - name: Set new package version
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: |
          echo "Setting version from tag: ${newVersion}"
          yarn version --immediate ${newVersion}
        env:
          newVersion: ${{ steps.newVer.outputs.newVersion }}
          VEMPAIN_ACTION_TOKEN: ${{ env.VEMPAIN_ACTION_TOKEN }}

      - name: Build production package
        run: |
          yarn install
          yarn build:production
        env:
          VEMPAIN_ACTION_TOKEN: ${{ env.VEMPAIN_ACTION_TOKEN }}

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image to registry
        shell: bash
        run: |
          imgName="${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')"
          docker build . --tag ${imgName}:latest
          echo "Setting versions to: '${mainVersion}', '${baseVersion}', '${newVersion}'"
          docker image tag ${imgName}:latest ${imgName}:${mainVersion}
          docker image tag ${imgName}:latest ${imgName}:${baseVersion}
          docker image tag ${imgName}:latest ${imgName}:${newVersion}
          docker push --all-tags ${imgName}
        env:
          mainVersion: ${{ steps.basemain.outputs.mainVersion }}
          baseVersion: ${{ steps.basemain.outputs.baseVersion }}
          newVersion: ${{ steps.newVer.outputs.newVersion }}

      - name: Create tag
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: actions/github-script@v9
        with:
          github-token: ${{ env.VEMPAIN_ACTION_TOKEN }}
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ steps.newVer.outputs.newVersion }}',
              sha: context.sha
            })

      - name: Create GitHub Release
        uses: actions/github-script@v9
        with:
          github-token: ${{ env.VEMPAIN_ACTION_TOKEN }}
          script: |
            const tag = '${{ steps.newVer.outputs.newVersion }}';
            const resp = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: `Automated release for ${tag}

              Docker tags pushed:
              - latest
              - ${{ steps.basemain.outputs.mainVersion }}
              - ${{ steps.basemain.outputs.baseVersion }}
              - ${tag}
              `,
              draft: false,
              prerelease: false,
              generate_release_notes: true
            });
            core.info(`Release created: ${resp.data.html_url}`);
